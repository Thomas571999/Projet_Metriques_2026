<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            background: linear-gradient(135deg, #1e3c72, #2a5298);

            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {

            background: white;

            width: 420px;

            padding: 40px;

            border-radius: 20px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.3);

            animation: apparition 1s ease;
        }

        @keyframes apparition {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #1e3c72;
            margin-bottom: 30px;
        }

        input, textarea {

            width: 100%;

            padding: 12px;

            margin-top: 10px;
            margin-bottom: 20px;

            border: 1px solid #ccc;

            border-radius: 10px;

            font-size: 16px;

            box-sizing: border-box;
        }

        textarea {
            resize: none;
            height: 120px;
        }

        button {

            width: 100%;

            padding: 14px;

            border: none;

            border-radius: 10px;

            background: #1e3c72;

            color: white;

            font-size: 18px;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {
            background: #2a5298;
            transform: scale(1.02);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: gray;
            font-size: 14px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>📩 Contactez-moi</h1>

        <form>

            <input type="text" placeholder="Votre prénom">

            <input type="text" placeholder="Votre nom">

            <textarea placeholder="Votre message..."></textarea>

            <button type="submit">
                Envoyer le message
            </button>

        </form>

        <div class="footer">
            Projet Flask • Codespaces • GitHub
        </div>

    </div>

</body>
</html>
